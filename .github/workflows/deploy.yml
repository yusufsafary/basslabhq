name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Vercel deployment
        id: deploy
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v13/deployments" \
            -d '{
              "name": "basslabhq",
              "gitSource": {
                "type": "github",
                "repoId": "1241389277",
                "ref": "main"
              }
            }')

          echo "Response: $RESPONSE"
          DEPLOY_ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          DEPLOY_URL=$(echo "$RESPONSE" | grep -o '"url":"[^"]*"' | head -1 | cut -d'"' -f4)
          echo "Deployment ID: $DEPLOY_ID"
          echo "Deployment URL: https://$DEPLOY_URL"
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT

      - name: Wait and assign production aliases
        run: |
          DEPLOY_ID="${{ steps.deploy.outputs.deploy_id }}"
          if [ -z "$DEPLOY_ID" ]; then
            echo "No deployment ID found, skipping"
            exit 1
          fi

          for i in $(seq 1 40); do
            sleep 15
            STATE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
              "https://api.vercel.com/v13/deployments/$DEPLOY_ID" \
              | grep -o '"readyState":"[^"]*"' | head -1 | cut -d'"' -f4)
            echo "[$i/40] State: $STATE"

            if [ "$STATE" = "READY" ]; then
              echo "Deployment ready. Assigning aliases..."

              curl -s -X POST \
                -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
                -H "Content-Type: application/json" \
                "https://api.vercel.com/v2/deployments/$DEPLOY_ID/aliases" \
                -d '{"alias":"basslabhq.vercel.app"}'
              echo "Assigned basslabhq.vercel.app"

              curl -s -X POST \
                -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
                -H "Content-Type: application/json" \
                "https://api.vercel.com/v2/deployments/$DEPLOY_ID/aliases" \
                -d '{"alias":"basslabhq.fun"}'
              echo "Assigned basslabhq.fun"

              curl -s -X POST \
                -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
                -H "Content-Type: application/json" \
                "https://api.vercel.com/v2/deployments/$DEPLOY_ID/aliases" \
                -d '{"alias":"www.basslabhq.fun"}'
              echo "Assigned www.basslabhq.fun"

              echo ""
              echo "Live at https://basslabhq.fun"
              exit 0
            fi

            if [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
              echo "Deployment failed: $STATE"
              exit 1
            fi
          done

          echo "Timeout waiting for deployment"
          exit 1
