name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Vercel deployment
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -e
          echo "Triggering Vercel deployment for ${{ github.sha }}..."

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v13/deployments" \
            -d "{
              \"name\": \"basslabhq\",
              \"gitSource\": {
                \"type\": \"github\",
                \"repoId\": \"1241389277\",
                \"ref\": \"main\",
                \"sha\": \"${{ github.sha }}\"
              },
              \"projectId\": \"prj_LXn4txLDZYEIgP5afDdoh3uIwMI6\",
              \"teamId\": \"team_FQL2L51QuUYN5gsM5ja91r17\",
              \"target\": \"production\"
            }")

          echo "$RESPONSE" | jq '{ id: .id, url: .url, state: .readyState }' || echo "$RESPONSE"

          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // .uid // empty')

          if [ -z "$DEPLOY_ID" ]; then
            echo "ERROR: Could not get deployment ID"
            echo "$RESPONSE"
            exit 1
          fi

          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "Deployment created: $DEPLOY_ID"

      - name: Wait for ready and assign production alias
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -e
          DEPLOY_ID="${{ steps.deploy.outputs.deploy_id }}"

          for i in $(seq 1 40); do
            sleep 15
            RESP=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$DEPLOY_ID")
            STATE=$(echo "$RESP" | jq -r '.readyState // .state // "UNKNOWN"')
            URL=$(echo "$RESP" | jq -r '.url // "pending"')
            echo "[$i/40] $STATE | $URL"

            if [ "$STATE" = "READY" ]; then
              echo "Assigning basslabhq.vercel.app..."
              curl -s -X POST \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json" \
                "https://api.vercel.com/v2/deployments/$DEPLOY_ID/aliases" \
                -d '{"alias":"basslabhq.vercel.app"}' | jq .
              echo "Live at https://basslabhq.vercel.app"
              exit 0
            fi

            if [ "$STATE" = "ERROR" ] || [ "$STATE" = "CANCELED" ]; then
              echo "Deployment failed: $STATE"
              exit 1
            fi
          done

          echo "Timeout reached"
          exit 1
